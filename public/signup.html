<!DOCTYPE html>
<html>
<head>
    <title>My Book | Sign Up</title>
    <style>
        #bar {
            height: 100px;
            background-color: #3c5a99;
            color: #d9dfeb;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-left: 20px;
            padding-right: 20px;
        }
        #login-link-button {
            background-color: #42b72a;
            color: white;
            padding: 8px 16px;
            text-align: center;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            font-size: 14px;
        }
        #signup-container {
            background-color: white;
            width: 450px;
            margin: auto;
            margin-top: 50px;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0px 2px 4px rgba(0,0,0,0.1);
        }
        h2 {
            margin-top: 0;
            margin-bottom: 5px;
            color: #333;
        }
        .subtitle {
            color: #606770;
            font-size: 15px;
            margin-bottom: 20px;
        }
        .text-input {
            height: 40px;
            width: 100%; 
            border-radius: 4px;
            border: solid 1px #ccc;
            padding: 8px;
            font-size: 14px;
            box-sizing: border-box; 
            margin-bottom: 15px;
        }
        .name-row {
            display: flex;
            gap: 12px;
        }
        #signup-submit-btn {
            height: 40px;
            width: 200px;
            background-color: #42b72a;
            border-radius: 4px;
            font-weight: bold;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
            display: block;
            margin: 20px auto 0 auto;
        }
    </style>
</head>
<body style="font-family: tahoma; background-color: #e9ebee; margin: 0;">
    
    <!-- Top Bar -->
    <div id="bar">
        <div style="font-size: 40px; font-weight: bold;">Mybook</div>
        <a href="login.html" id="login-link-button">Log In</a>
    </div>

    <!-- Signup Card Box -->
    <div id="signup-container">
        <h2>Create a new account</h2>
        <div class="subtitle">It's quick and easy.</div>
        
        <form action="/signup" method="POST">
        <div class="name-row">
            <input type="text" name="firstName" class="text-input" placeholder="First name" required>
            <input type="text" name="lastName" class="text-input" placeholder="Surname" required>
        </div>
        Gender:
        <select name="gender" class="text-input">
            <option value="Male">Male</option>
            <option value="Female">Female</option>
        </select>
        <input type="email" name="email" class="text-input" placeholder="Email" required>
        <input type="password" name="password" class="text-input" placeholder="New password" required>
        <input type="submit" id="signup-submit-btn" value="Sign Up">
    </form>
    </div>

</body>
</html>
