<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>
    <style>
        body { font-family: tahoma; background-color: #e9ebee; text-align: center; }
        .box { background: white; width: 400px; margin: 50px auto; padding: 20px; border-radius: 8px; }
        input { width: 90%; padding: 10px; margin: 10px 0; }
        button { background-color: #3c5a99; color: white; padding: 10px; border: none; cursor: pointer; width: 95%; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Reset Password</h2>
        <form action="/forgot-password" method="POST">
            <input type="email" name="email" placeholder="Enter your email" required>
            <button type="submit">Send Verification Code</button>
        </form>
    </div>
</body>
</html>
